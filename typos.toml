[default.extend-words]
# Technical words
edn = "edn"
datas = "datas"
juxt = "juxt"
Ded = "Ded"         # Shows up in ANDed
referer = "referer" # This is a misspelling in the http spec so not much we can do

# False positives
collapsable = "collapsable" # This an ok alternative to collapsible
BA = "BA"
fo = "fo"
aks = "aks"
Mannor = "Mannor"
nd = "nd"
deleteable = "deleteable"
fom = "fom"
tne = "tne"
Damon = "Damon"
[files]
extend-exclude = ["resources/*",
                  "src/resources/*",
                  "scripts/resources/*",
                  "src/test/fixtures/*",
                  "deps/db-sync/test/logseq/db_sync/fixtures/*.edn",
                  "clj-e2e/resources/*",
                  "deps/common/src/logseq/common/plural.cljs",
                  "packages/ui/src/amplify/lang.ts",
                  # Pure W3C named-color → hex tables; hex digits trip the typos
                  # tokenizer ("daa" inside "e6daa6"/"daa520" etc.). No prose.
                  "src/main/frontend/colors/named.cljs",
                  "src/main/frontend/colors/css.cljs"]
