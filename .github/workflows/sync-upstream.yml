name: Sync upstream

on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    name: Merge upstream/master into fork
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: git remote add upstream https://github.com/logseq/logseq.git

      - name: Fetch upstream master
        run: git fetch upstream master

      - name: Merge upstream into master
        run: git merge upstream/master --no-edit

      - name: Push to fork
        run: git push origin master
