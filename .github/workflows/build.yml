name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - '*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '*.md'

env:
  CLOJURE_VERSION: '1.12.4.1618'
  JAVA_VERSION: '21'
  # This is the latest node version we can run.
  NODE_VERSION: '24'
  OCAML_VERSION: '5.4.0'
  BABASHKA_VERSION: '1.12.215'

jobs:
  typos:
    name: Spell Check with Typos
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Actions Repository
        uses: actions/checkout@v4
      - name: Check spelling with custom config file
        uses: crate-ci/typos@v1.16.8
        with:
          config: ./typos.toml

  test:
    strategy:
      matrix:
        operating-system: [ubuntu-22.04]

    runs-on: ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: ${{ env.CLOJURE_VERSION }}
          bb: ${{ env.BABASHKA_VERSION }}

      - name: Clojure cache
        uses: actions/cache@v4
        id: clojure-deps
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-deps-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-deps-

      - name: Fetch Clojure deps
        if: steps.clojure-deps.outputs.cache-hit != 'true'
        run: clojure -A:cljs -P

      - name: Fetch pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Build test asset
        run: clojure -M:test compile test

      - name: Run ClojureScript query tests against basic query type
        run: DB_QUERY_TYPE=basic pnpm cljs:run-test -r frontend.db.query-dsl-test

      - name: Run ClojureScript tests
        run: pnpm cljs:run-test

  cli-e2e:
    name: CLI E2E tests
    strategy:
      matrix:
        operating-system: [ubuntu-22.04]

    runs-on: ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            cli/pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: ${{ env.CLOJURE_VERSION }}
          bb: ${{ env.BABASHKA_VERSION }}

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}

      - name: Clojure cache
        uses: actions/cache@v4
        id: clojure-deps
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: ${{ runner.os }}-clojure-deps-cli-e2e-${{ hashFiles('deps.edn') }}
          restore-keys: ${{ runner.os }}-clojure-deps-

      - name: Fetch Clojure deps
        if: steps.clojure-deps.outputs.cache-hit != 'true'
        run: clojure -A:cljs -P

      - name: Fetch OCaml deps
        working-directory: cli
        run: opam install . --deps-only --with-test --yes

      - name: Fetch pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Fetch CLI pnpm deps
        run: pnpm --dir cli install --frozen-lockfile

      - name: Run CLI E2E tests
        run: opam exec -- bb dev:cli-e2e --jobs 1 --verbose

  lint:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: ${{ env.CLOJURE_VERSION }}
          bb: ${{ env.BABASHKA_VERSION }}

      - name: Run clj-kondo lint
        run: clojure -M:clj-kondo --parallel --lint src

      - name: Carve lint for unused vars
        run: bb lint:carve

      - name: Lint for vars that are too large
        run: bb lint:large-vars

      - name: Lint for namespaces that aren't documented
        run: bb lint:ns-docstrings

      - name: Lint invalid translation entries
        run: bb lang:validate-translations

      - name: Lint hardcoded user-facing strings
        run: bb lang:lint-hardcoded

      - name: Lint to keep worker independent of frontend
        run: bb lint:worker-and-frontend-separate

  db-graph-test:
    strategy:
      matrix:
        operating-system: [ubuntu-latest]

    runs-on: ${{ matrix.operating-system }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
          cache-dependency-path: |
            pnpm-lock.yaml
            cli/pnpm-lock.yaml
            deps/db/pnpm-lock.yaml
            scripts/pnpm-lock.yaml

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.5
        with:
          cli: ${{ env.CLOJURE_VERSION }}
          bb: ${{ env.BABASHKA_VERSION }}

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ env.OCAML_VERSION }}

      - name: Install CLI Linux runtime deps
        run: sudo apt-get update && sudo apt-get install -y libsecret-1-0

      - name: Fetch OCaml deps
        working-directory: cli
        run: opam install . --deps-only --with-test --yes

      - name: Fetch scripts pnpm deps
        run: cd scripts && pnpm install --frozen-lockfile

      - name: Fetch root pnpm deps
        run: pnpm install --frozen-lockfile

      - name: Fetch CLI pnpm deps
        run: pnpm --dir cli install --frozen-lockfile

      - name: Create DB graph with properties
        run: cd scripts && pnpm exec nbb-logseq src/logseq/tasks/db_graph/create_graph_with_properties.cljs ./cli-root/graphs/properties-graph

      - name: Create DB graph with classes
        run: cd scripts && pnpm exec nbb-logseq src/logseq/tasks/db_graph/create_graph_with_schema_org.cljs ./cli-root/graphs/schema-graph

      - name: Fetch deps/db pnpm deps
        run: cd deps/db && pnpm install --frozen-lockfile

      - name: Build logseq CLI runtime
        run: |
          opam exec -- pnpm cli:release
          pnpm db-worker-node:release:bundle
          pnpm --dir deps/db-sync build:node-adapter
          node scripts/prepare-cli-package.mjs
          pnpm --dir dist/cli-package install --prod
          pnpm --dir dist/cli-package pack --pack-destination ../

      - name: Smoke test packaged CLI
        run: node dist/cli-package/dist/logseq.js --version

      - name: Validate created DB graphs
        run: |
          node dist/cli-package/dist/logseq.js --root-dir scripts/cli-root --graph properties-graph --timeout-ms 3000 --profile --verbose graph validate
          node dist/cli-package/dist/logseq.js --root-dir scripts/cli-root --graph schema-graph --timeout-ms 120000 --profile --verbose graph validate

      - name: Print db-worker-node logs on graph validation failure
        if: failure()
        run: |
          find scripts/cli-root/graphs -maxdepth 2 -name 'db-worker-node-*.log' -print -exec tail -n 200 {} \; || true
          pgrep -af db-worker-node || true

      - name: Export a created DB graph
        run: node dist/cli-package/dist/logseq.js --root-dir scripts/cli-root --graph properties-graph --timeout-ms 3000 graph export --type edn --file scripts/properties.edn
      - name: Import an exported graph to confirm the export is working
        run: node dist/cli-package/dist/logseq.js --root-dir scripts/cli-root --graph properties-graph-roundtrip --timeout-ms 20000 graph import --type edn --input scripts/properties.edn
