name = "logseq-sync"
main = "dist/worker/main.js"
compatibility_date = "2025-12-10"
compatibility_flags = [ "nodejs_compat" ]

[[containers]]
class_name = "Sandbox"
image = "./Dockerfile.sandbox-agent"
instance_type = "lite"
max_instances = 1

[containers.settings]
idle_timeout = "10m"

[version_metadata]
binding = "CF_VERSION_METADATA"

[observability]
enabled = true

[[durable_objects.bindings]]
name = "LOGSEQ_SYNC_DO"
class_name = "SyncDO"

[[durable_objects.bindings]]
name = "LOGSEQ_AGENT_SESSION_DO"
class_name = "AgentSessionDO"

[[durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[r2_buckets]]
binding = "LOGSEQ_SYNC_ASSETS"
bucket_name = "logseq-sync-assets-prod"

[[d1_databases]]
binding = "DB"
database_name = "logseq-sync-graph-meta-prod"
database_id = "00325aa2-c805-4693-b599-900a25dcde42"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "SyncDO" ]

[[migrations]]
tag = "v2"
new_sqlite_classes = [ "AgentSessionDO" ]

[[migrations]]
tag = "v3"
new_sqlite_classes = [ "Sandbox" ]

[vars]
COGNITO_JWKS_URL = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8"
COGNITO_CLIENT_ID = "69cs1lgme7p8kbgld8n5kseii6"
GITHUB_DEFAULT_BASE_BRANCH = "master"

[env.staging]
name = "logseq-sync-staging"

[env.staging.vars]
COGNITO_JWKS_URL = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8"
COGNITO_CLIENT_ID = "69cs1lgme7p8kbgld8n5kseii6"
GITHUB_DEFAULT_BASE_BRANCH = "master"
