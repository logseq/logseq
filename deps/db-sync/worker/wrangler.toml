name = "logseq-sync"
main = "entry.mjs"
compatibility_date = "2026-07-11"
compatibility_flags = [ "nodejs_compat" ]

[[worker_loaders]]
binding = "LOADER"

[limits]
cpu_ms = 300000

[version_metadata]
binding = "CF_VERSION_METADATA"

[observability]
enabled = true

[observability.logs]
invocation_logs = false

[[durable_objects.bindings]]
name = "LOGSEQ_SYNC_DO"
class_name = "SyncDO"

[[r2_buckets]]
binding = "LOGSEQ_SYNC_ASSETS"
bucket_name = "logseq-sync-assets-prod"

[[d1_databases]]
binding = "DB"
database_name = "logseq-sync-graph-meta-prod"
database_id = "00325aa2-c805-4693-b599-900a25dcde42"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "SyncDO" ]

[vars]
COGNITO_JWKS_URL = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8"
COGNITO_CLIENT_ID = "69cs1lgme7p8kbgld8n5kseii6"

[[ratelimits]]
name = "SEMANTIC_READ_RATE_LIMITER"
namespace_id = "1001"

[ratelimits.simple]
limit = 120
period = 60

[[ratelimits]]
name = "SEMANTIC_WRITE_RATE_LIMITER"
namespace_id = "1002"

[ratelimits.simple]
limit = 20
period = 60

[env.staging]
name = "logseq-sync-staging"

[env.staging.limits]
