name = "logseq-agents"
main = "dist/agents/main.js"
compatibility_date = "2026-02-28"
compatibility_flags = [ "nodejs_compat" ]

[[containers]]
class_name = "Sandbox"
image = "./Dockerfile.sandbox-agent"
instance_type = "standard-1"
max_instances = 100

[version_metadata]
binding = "CF_VERSION_METADATA"

[observability]
enabled = true

[observability.logs]
invocation_logs = false

[[durable_objects.bindings]]
name = "LOGSEQ_AGENT_SESSION_DO"
class_name = "AgentSessionDO"

[[durable_objects.bindings]]
name = "Sandbox"
class_name = "Sandbox"

[[r2_buckets]]
binding = "BACKUP_BUCKET"
bucket_name = "logseq-sync-assets-prod"
preview_bucket_name = "logseq-sync-assets-prod"
remote = true

[[d1_databases]]
binding = "AGENTS_DB"
database_name = "logseq-agents-staging"
database_id = "00325aa2-c805-4693-b599-900a25dcde42"

[[migrations]]
tag = "v1"
new_sqlite_classes = [ "AgentSessionDO" ]

[[migrations]]
tag = "v2"
new_sqlite_classes = [ "Sandbox" ]

[vars]
COGNITO_JWKS_URL = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8/.well-known/jwks.json"
COGNITO_ISSUER = "https://cognito-idp.us-east-1.amazonaws.com/us-east-1_dtagLnju8"
COGNITO_CLIENT_ID = "69cs1lgme7p8kbgld8n5kseii6"
AGENT_RUNTIME_PROVIDER = "vercel"
CLOUDFLARE_ACCOUNT_ID = "2553ea8236c11ea0f88de28fce1cbfee"
BACKUP_BUCKET_NAME = "logseq-sync-assets-prod"

