appId: com.logseq.logseq
electronUpdaterCompatibility: ">=2.16"

directories:
  buildResources: .
  output: dist

files:
  - "**/*"
  - "!dist/**"
  - "!mobile/**"
  - "!android/**"
  - "!ios/**"
  - "!js/react.development.js"
  - "!js/react-dom.development.js"
  - "!js/publishing/*.map"
  - "!js/publishing/manifest.edn"
  - "!js/publishing/module-loader.*"
  - "!js/sqlite3.wasm"
  - "!css/fonts/tabler-icons.eot"
  - "!css/fonts/tabler-icons.ttf"
  - "!css/fonts/tabler-icons.woff"
  - "!**/node_modules/**/*.map"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/*.d.cts"
  - "!**/node_modules/**/*.d.mts"
  - "!**/node_modules/**/*.{ts,cts,mts}"
  - "!**/node_modules/**/*.{c,cc,cpp,h,hpp,gyp}"
  - "!**/node_modules/**/*.test-d.ts"
  - "!**/node_modules/**/*.test-d.cts"
  - "!**/node_modules/**/*.test-d.mts"
  - "!**/node_modules/**/*.{test,spec}.{js,cjs,mjs,ts,cts,mts}"
  - "!**/node_modules/**/*{example,benchmark,bench,tests,runkit}*.{js,cjs,mjs,ts,cts,mts}"
  - "!**/node_modules/**/*.{md,markdown}"
  - "!**/node_modules/**/{test,tests,__tests__,powered-test,example,examples,benchmark,benchmarks}/**"
  - "!**/node_modules/**/{tsconfig.json,eslint.config.js,.editorconfig}"

toolsets:
  appimage: "1.0.2"

protocols:
  - name: logseq
    schemes:
      - logseq

publish:
  - provider: github
    owner: logseq
    repo: logseq

extraResources:
  - from: .agents/skills/logseq-cli/SKILL.md
    to: .agents/skills/logseq-cli/SKILL.md
  - from: ../sidecar
    to: sidecar

mac:
  artifactName: ${productName}-darwin-${arch}-${version}.${ext}
  icon: icons/logseq_big_sur.icns
  target:
    - dmg
    - zip
  hardenedRuntime: true
  entitlements: entitlements.plist
  entitlementsInherit: entitlements.plist

dmg:
  format: ULFO

win:
  icon: icons/logseq.ico
  target:
    - nsis
    - zip

nsis:
  artifactName: ${productName}-win-${arch}-${version}-nsis.${ext}
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: icons/logseq.ico
  uninstallerIcon: icons/logseq.ico

linux:
  artifactName: ${productName}-linux-${arch}-${version}.${ext}
  icon: icons/logseq.png
  category: Office
  target:
    - AppImage
    - zip
  mimeTypes:
    - x-scheme-handler/logseq
